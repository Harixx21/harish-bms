<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Harish BMS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
  background: linear-gradient(135deg, #1a252f 0%, #2c3e50 50%, #1a252f 100%);
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-card {
  background: white;
  border-radius: 24px;
  padding: 40px 32px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.login-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #e67e22, #f39c12);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  margin: 0 auto 20px;
}
.login-card h1 { text-align:center; font-size:24px; font-weight:800; color:#2c3e50; margin-bottom:4px; }
.login-card p { text-align:center; color:#7f8c8d; font-size:14px; margin-bottom:28px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:12px; font-weight:700; color:#7f8c8d; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
.form-group input {
  width:100%; padding:12px 16px;
  border:2px solid #e8e8e8;
  border-radius:12px; font-size:15px;
  outline:none; transition:border-color 0.2s;
}
.form-group input:focus { border-color:#e67e22; }
.login-btn {
  width:100%; padding:14px;
  background:linear-gradient(135deg,#e67e22,#f39c12);
  color:white; border:none;
  border-radius:14px; font-size:16px; font-weight:700;
  cursor:pointer; margin-top:8px;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.login-btn:hover { opacity:0.9; }
.error-msg { background:#fdf0ef; border:1px solid #e74c3c; color:#e74c3c; padding:10px 14px; border-radius:10px; font-size:13px; margin-top:12px; display:none; }
.customer-link { text-align:center; margin-top:20px; font-size:13px; color:#7f8c8d; }
.customer-link a { color:#e67e22; font-weight:600; text-decoration:none; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-icon">🔐</div>
  <h1>Owner Login</h1>
  <p>Harish Building Materials — Admin Panel</p>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="admin" value="admin">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" value="admin123" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="login-btn" onclick="login()" id="loginBtn">
    <i class="fa fa-sign-in-alt"></i> Login
  </button>
  <div class="error-msg" id="errorMsg"></div>
  <div class="customer-link">
    <a href="/">← Back to Customer Store</a>
  </div>
</div>
<script>
async function login() {
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  err.style.display = 'none';
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Logging in...';
  btn.disabled = true;
  try {
    const res = await fetch('/admin/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.success) { window.location.href = '/admin/dashboard'; }
    else {
      err.textContent = data.error || 'Invalid credentials';
      err.style.display = 'block';
      btn.innerHTML = '<i class="fa fa-sign-in-alt"></i> Login';
      btn.disabled = false;
    }
  } catch(e) {
    err.textContent = 'Connection error. Is Flask running?';
    err.style.display = 'block';
    btn.innerHTML = '<i class="fa fa-sign-in-alt"></i> Login';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
